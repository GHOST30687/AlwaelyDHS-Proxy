app = "alwaelydhs-proxy"
primary_region = "fra"

[[services]]
  internal_port = 443    # غيرها من 80 إلى 443
  protocol = "tcp"
  auto_start_machines = true
  auto_stop_machines = true

  [[services.ports]]
    port = 80            # ابقى على 80 براحتك أو حولها 443

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048